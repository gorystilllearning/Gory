name: Build Gory ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso syslinux mtools dosfstools edk2-ovmf grub

      - name: Build ISO
        run: |
          # Copy base releng profile to a build directory
          cp -r /usr/share/archiso/configs/releng /tmp/build-profile
          
          # Overwrite with our custom files
          cp profiledef.sh /tmp/build-profile/
          cp pacman.conf /tmp/build-profile/
          cat packages.x86_64 >> /tmp/build-profile/packages.x86_64
          cp -r airootfs/* /tmp/build-profile/airootfs/
          
          mkdir -p /tmp/archiso-tmp
          mkdir -p /tmp/archiso-out
          
          # Run mkarchiso using the mixed profile
          mkarchiso -v -w /tmp/archiso-tmp -o /tmp/archiso-out /tmp/build-profile

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gory-ISO
          path: /tmp/archiso-out/*.iso
          retention-days: 5

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: /tmp/archiso-out/*.iso
          tag_name: "v${{ github.run_number }}"
          name: "Gory Build #${{ github.run_number }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
