name: Build Gory ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ISO using Docker
        run: |
          docker run --rm --privileged -v ${{ github.workspace }}:/workspace -w /workspace archlinux:base-devel bash -c "
            pacman -Syu --noconfirm
            pacman -S --noconfirm archiso syslinux mtools dosfstools edk2-ovmf grub

            cp -r /usr/share/archiso/configs/releng /tmp/build-profile
            cp profiledef.sh /tmp/build-profile/
            cp pacman.conf /tmp/build-profile/
            cat packages.x86_64 >> /tmp/build-profile/packages.x86_64
            cp -r airootfs/* /tmp/build-profile/airootfs/

            mkdir -p /tmp/archiso-tmp
            mkdir -p /workspace/archiso-out

            mkdir -p /tmp/build-profile/airootfs/usr/share/aurorae/themes/McMojave
            curl -sL https://github.com/vinceliuice/McMojave-kde/archive/refs/heads/master.tar.gz | tar xz -C /tmp/build-profile/airootfs/usr/share/aurorae/themes/McMojave --strip-components=3 McMojave-kde-master/aurorae/McMojave

            mkdir -p /tmp/build-profile/airootfs/usr/share/icons
            curl -sL https://github.com/EliverLara/candy-icons/archive/refs/heads/master.tar.gz | tar xz -C /tmp/build-profile/airootfs/usr/share/icons
            mv /tmp/build-profile/airootfs/usr/share/icons/candy-icons-master /tmp/build-profile/airootfs/usr/share/icons/candy-icons

            mkarchiso -v -w /tmp/archiso-tmp -o /workspace/archiso-out /tmp/build-profile
          "

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gory-ISO
          path: archiso-out/*.iso
          retention-days: 5
